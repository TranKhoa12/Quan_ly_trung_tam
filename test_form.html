<!DOCTYPE html>
<html>
<head>
    <title>Test Hidden Inputs</title>
</head>
<body>
    <h3>Test Form Data</h3>
    
    <!-- Simulate visitor counter -->
    <div>
        <span id="visitors-count">2</span> visitors
        <button onclick="changeVisitors(1)">+</button>
        <button onclick="changeVisitors(-1)">-</button>
    </div>
    
    <!-- Simulate registered counter -->
    <div>
        <span id="registered-count">1</span> registered
    </div>
    
    <!-- Simulate checkboxes -->
    <div>
        <input type="checkbox" name="customers[0][registered]" onchange="updateStats()" checked> Customer 1
        <input type="checkbox" name="customers[1][registered]" onchange="updateStats()"> Customer 2
    </div>
    
    <!-- Form with hidden inputs -->
    <form id="testForm" method="POST" action="/test">
        <input type="hidden" id="total_visitors" name="total_visitors" value="1">
        <input type="hidden" id="total_registered" name="total_registered" value="0">
        <button type="button" onclick="testSubmit()">Test Submit</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        let visitorCount = 2;
        
        function changeVisitors(delta) {
            const newCount = visitorCount + delta;
            if (newCount >= 0) {
                visitorCount = newCount;
                document.getElementById('visitors-count').textContent = visitorCount;
                document.getElementById('total_visitors').value = visitorCount;
                console.log('Updated total_visitors to:', visitorCount);
            }
        }
        
        function updateStats() {
            const checkboxes = document.querySelectorAll('input[name*="[registered]"]:checked');
            const registeredCount = checkboxes.length;
            
            document.getElementById('registered-count').textContent = registeredCount;
            document.getElementById('total_registered').value = registeredCount;
            
            console.log('Updated registered count to:', registeredCount);
        }
        
        function testSubmit() {
            // Update values before submit (like saveReport function)
            const visitorCount = parseInt(document.getElementById('visitors-count').textContent);
            const registeredCheckboxes = document.querySelectorAll('input[name*="[registered]"]:checked');
            const registeredCount = registeredCheckboxes.length;
            
            document.getElementById('total_visitors').value = visitorCount;
            document.getElementById('total_registered').value = registeredCount;
            
            console.log('Final values:');
            console.log('Visitors:', document.getElementById('total_visitors').value);
            console.log('Registered:', document.getElementById('total_registered').value);
            
            // Show form data
            const formData = new FormData(document.getElementById('testForm'));
            let result = 'Form data:\n';
            for (let [key, value] of formData.entries()) {
                result += key + ': ' + value + '\n';
            }
            document.getElementById('result').innerHTML = '<pre>' + result + '</pre>';
        }
        
        // Initialize
        updateStats();
    </script>
</body>
</html>
