<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#4361ee"/>
  <!-- Building body -->
  <rect x="12" y="28" width="40" height="24" rx="2" fill="white"/>
  <!-- Roof / triangle -->
  <polygon points="8,30 32,10 56,30" fill="#ffffff" opacity="0.9"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="14" rx="1.5" fill="#4361ee"/>
  <!-- Windows left -->
  <rect x="15" y="33" width="8" height="7" rx="1" fill="#a5b4fc"/>
  <!-- Windows right -->
  <rect x="41" y="33" width="8" height="7" rx="1" fill="#a5b4fc"/>
  <!-- Flag pole -->
  <line x1="32" y1="10" x2="32" y2="4" stroke="white" stroke-width="1.5"/>
  <!-- Flag -->
  <polygon points="32,4 40,6.5 32,9" fill="#f72585"/>
</svg>
