# ============================================================
# docker-compose.yml - Quản lý trung tâm
# Services: app (PHP+Apache) + db (MySQL) + phpmyadmin
# ============================================================
services:

  # ── PHP + Apache ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quan_ly_trung_tam_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-quan_ly_trung_tam}
      DB_USER: ${DB_USER:-app_user}
      DB_PASS: ${DB_PASS:-secret}
    volumes:
      # Giữ uploads & logs ra ngoài container (không mất khi rebuild)
      - uploads_data:/var/www/html/public/uploads
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quan_ly_trung_tam_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-quan_ly_trung_tam}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
      # Tự động chạy schema khi khởi tạo lần đầu
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "3306:3306"       # Comment dòng này trên production để không expose ra ngoài
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── phpMyAdmin (chỉ dùng khi cần, tắt trên production) ──
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: quan_ly_trung_tam_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    depends_on:
      - db
    networks:
      - app_network
    profiles:
      - tools    # Chỉ chạy khi: docker compose --profile tools up

volumes:
  db_data:
  uploads_data:
  logs_data:

networks:
  app_network:
    driver: bridge
